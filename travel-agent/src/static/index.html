<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能旅行助手</title>
    <style>
        /* ── 全局重置 ──────────────────────────── */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #E8F5E9 0%, #E3F2FD 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── 顶栏 ──────────────────────────────── */
        header {
            background: linear-gradient(90deg, #43A047, #1E88E5);
            color: white;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        header h1 {
            font-size: 20px;
            font-weight: 600;
        }
        header .logo {
            font-size: 28px;
        }

        /* ── 聊天区域 ──────────────────────────── */
        #chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }

        .message {
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── 用户消息气泡 ──────────────────────── */
        .user-message {
            display: flex;
            justify-content: flex-end;
        }
        .user-message .bubble {
            background: #E8F5E9;
            border: 1px solid #A5D6A7;
            border-radius: 16px 16px 4px 16px;
            padding: 12px 18px;
            max-width: 75%;
            font-size: 15px;
            color: #2E7D32;
        }
        .user-message .bubble .sender {
            display: block;
            font-size: 11px;
            color: #66BB6A;
            margin-bottom: 4px;
            font-weight: 600;
        }

        /* ── 推理链卡片 ────────────────────────── */
        .reasoning-chain {
            background: white;
            border-radius: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .reasoning-chain .chain-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: #F1F8E9;
            cursor: pointer;
            user-select: none;
            font-size: 14px;
            font-weight: 600;
            color: #33691E;
        }
        .reasoning-chain .chain-header .arrow {
            transition: transform 0.2s;
            font-size: 12px;
        }
        .reasoning-chain .chain-body {
            padding: 0 16px;
            max-height: 800px;
            overflow: hidden;
            transition: max-height 0.3s ease, padding 0.3s ease;
        }
        .reasoning-chain.collapsed .chain-body {
            max-height: 0;
            padding-top: 0;
            padding-bottom: 0;
        }
        .reasoning-chain.collapsed .arrow {
            transform: rotate(-90deg);
        }

        .chain-step {
            border-left: 3px solid #43A047;
            padding: 10px 14px;
            margin: 12px 0;
            background: #F9FBE7;
            border-radius: 0 8px 8px 0;
            font-size: 13px;
            line-height: 1.6;
        }
        .chain-step .step-label {
            font-weight: 600;
            font-size: 12px;
            color: #558B2F;
        }
        .chain-step .step-detail {
            color: #555;
            margin: 2px 0;
        }
        .chain-step .step-tool {
            color: #1565C0;
            font-family: monospace;
            font-size: 12px;
        }
        .chain-step .step-obs {
            color: #333;
            background: #FFF8E1;
            padding: 6px 10px;
            border-radius: 6px;
            margin-top: 4px;
            font-size: 13px;
        }

        /* ── Agent 回答气泡 ────────────────────── */
        .agent-answer {
            display: flex;
            justify-content: flex-start;
        }
        .agent-answer .bubble {
            background: #E3F2FD;
            border: 1px solid #90CAF9;
            border-radius: 16px 16px 16px 4px;
            padding: 14px 18px;
            max-width: 85%;
            font-size: 14px;
            color: #0D47A1;
            line-height: 1.7;
            white-space: pre-wrap;
        }
        .agent-answer .bubble .sender {
            display: block;
            font-size: 11px;
            color: #42A5F5;
            margin-bottom: 6px;
            font-weight: 600;
        }

        /* ── Loading ───────────────────────────── */
        .loading {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            color: #888;
            font-size: 14px;
        }
        .loading .dots span {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #43A047;
            animation: bounce 1.2s infinite;
        }
        .loading .dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading .dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-6px); }
        }

        /* ── 输入区域 ──────────────────────────── */
        footer {
            background: white;
            border-top: 1px solid #E0E0E0;
            padding: 12px 20px;
        }
        .input-row {
            display: flex;
            gap: 10px;
            max-width: 800px;
            margin: 0 auto;
        }
        .input-row input {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #E0E0E0;
            border-radius: 24px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-row input:focus {
            border-color: #43A047;
        }
        .input-row button {
            background: #43A047;
            color: white;
            border: none;
            border-radius: 24px;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .input-row button:hover {
            background: #388E3C;
        }
        .input-row button:disabled {
            background: #C8E6C9;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <!-- 顶栏 -->
    <header>
        <span class="logo">&#x1F333;</span>
        <h1>智能旅行助手</h1>
    </header>

    <!-- 聊天区域 -->
    <div id="chat-area" aria-live="polite">
        <div id="welcome-msg" style="text-align:center; color:#999; padding:40px 0; font-size:14px;">
            &#x1F30D; 告诉我你想去哪里，我帮你查天气、推荐景点
        </div>
    </div>

    <!-- 加载指示器（默认隐藏） -->
    <div id="loading" class="loading" role="status" aria-live="polite" style="display:none; padding:12px 20px; max-width:800px; margin:0 auto;">
        思考中<span class="dots"><span></span><span></span><span></span></span>
    </div>

    <!-- 输入区域 -->
    <footer>
        <div class="input-row">
            <input
                id="query-input"
                type="text"
                placeholder="请输入您的问题，例如：今天北京天气怎么样？"
                autocomplete="off"
                aria-label="输入您的问题"
            />
            <button id="send-btn" onclick="sendMessage()">&#x2708;&#xFE0F; 发送</button>
        </div>
    </footer>

    <script>
        const chatArea = document.getElementById('chat-area');
        const queryInput = document.getElementById('query-input');
        const sendBtn = document.getElementById('send-btn');
        const loadingEl = document.getElementById('loading');

        // 回车发送
        queryInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        /**
         * 发送消息到后端，渲染结果
         */
        async function sendMessage() {
            const query = queryInput.value.trim();
            if (!query) return;

            // 清除初始提示（如果有的话）
            document.getElementById('welcome-msg')?.remove();

            // 显示用户消息
            addUserMessage(query);
            queryInput.value = '';
            setLoading(true);

            try {
                const resp = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query }),
                });

                if (!resp.ok) {
                    throw new Error(`服务器错误: ${resp.status}`);
                }

                const data = await resp.json();

                // 渲染推理链
                if (data.steps && data.steps.length > 0) {
                    addReasoningChain(data.steps);
                }

                // 渲染最终回答
                if (data.answer) {
                    addAgentAnswer(data.answer);
                }

            } catch (err) {
                addError(err.message);
            } finally {
                setLoading(false);
                scrollToBottom();
            }
        }

        function addUserMessage(text) {
            const div = document.createElement('div');
            div.className = 'message user-message';
            div.innerHTML = `
                <div class="bubble">
                    <span class="sender">You</span>
                    ${escapeHtml(text)}
                </div>`;
            chatArea.appendChild(div);
            scrollToBottom();
        }

        function addReasoningChain(steps) {
            const div = document.createElement('div');
            div.className = 'message';

            let stepsHtml = '';
            for (const step of steps) {
                stepsHtml += `
                    <div class="chain-step">
                        <div class="step-label">&#x1F52E; Round ${step.round} — ${escapeHtml(step.tool_label || step.tool)}</div>
                        <div class="step-detail">&#x1F4AD; 思考：${escapeHtml(step.thought)}</div>
                        <div class="step-tool">&#x1F527; 调用：${escapeHtml(step.tool)}(${escapeHtml(step.tool_input)})</div>
                        <div class="step-obs">&#x1F4CA; 结果：${escapeHtml(step.observation || '等待中...')}</div>
                    </div>`;
            }

            div.innerHTML = `
                <div class="reasoning-chain">
                    <div class="chain-header" tabindex="0" role="button" onclick="toggleChain(this)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggleChain(this)}">
                        <span class="arrow">&#x25BC;</span>
                        &#x1F9E0; Agent 推理过程（${steps.length} 轮）
                    </div>
                    <div class="chain-body">${stepsHtml}</div>
                </div>`;

            chatArea.appendChild(div);
            scrollToBottom();
        }

        function addAgentAnswer(text) {
            const div = document.createElement('div');
            div.className = 'message agent-answer';
            div.innerHTML = `
                <div class="bubble">
                    <span class="sender">&#x1F30D; 旅行助手</span>
                    ${escapeHtml(text).replace(/\n/g, '<br>')}
                </div>`;
            chatArea.appendChild(div);
            scrollToBottom();
        }

        function addError(msg) {
            const div = document.createElement('div');
            div.className = 'message agent-answer';
            div.innerHTML = `
                <div class="bubble" style="background:#FFEBEE;border-color:#EF9A9A;color:#C62828;">
                    <span class="sender" style="color:#EF5350;">Error</span>
                    ${escapeHtml(msg)}
                </div>`;
            chatArea.appendChild(div);
            scrollToBottom();
        }

        function setLoading(loading) {
            loadingEl.style.display = loading ? 'flex' : 'none';
            sendBtn.disabled = loading;
            queryInput.disabled = loading;
            if (!loading) {
                queryInput.focus();
            }
        }

        function toggleChain(header) {
            header.parentElement.classList.toggle('collapsed');
        }

        function scrollToBottom() {
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function escapeHtml(text) {
            if (text == null) return '';
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
            return String(text).replace(/[&<>"']/g, c => map[c]);
        }
    </script>

</body>
</html>
